<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <title>File Upload Web App</title>
</head>
<body>
    <div class="container">
        <h1>File Upload Web App</h1>
        
        <section id="customer-section">
            <h2>Customer Section</h2>
            <form action="/upload" method="POST" enctype="multipart/form-data">
                <label for="file-upload">Upload a file:</label>
                <input type="file" id="file-upload" name="file" required>
                <button type="submit">Submit</button>
            </form>
        </section>

        <section id="shopkeeper-section">
            <h2>Shopkeeper Section</h2>
            <h3>Uploaded Files:</h3>
            <ul id="file-list">
                <!-- Dynamically populated list of uploaded files -->
            </ul>
        </section>
    </div>

    <script>
        // Fetch and display the list of uploaded files for the shopkeeper
        async function fetchUploadedFiles() {
            const response = await fetch('/uploaded-files');
            const files = await response.json();
            const fileList = document.getElementById('file-list');
            fileList.innerHTML = '';

            files.forEach(file => {
                const listItem = document.createElement('li');
                listItem.textContent = file;
                fileList.appendChild(listItem);
            });
        }

        // Call the function to fetch files on page load
        window.onload = fetchUploadedFiles;
    </script>
</body>
</html>
